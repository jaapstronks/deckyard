services:
  app:
    build: .
    container_name: deckyard-sandbox-app
    restart: unless-stopped
    environment:
      PORT: "4177"
      HOST: "0.0.0.0"

      # Sandbox mode
      SANDBOX_MODE: "1"
      SANDBOX_TTL_HOURS: "${SANDBOX_TTL_HOURS:-24}"
      # Must be a real theme id. Sandbox shows only the neutral built-in
      # themes (corporate, deckyard, editorial, midnight, playful); an operator
      # can narrow that to a curated set by adding sandbox-*.json themes.
      SANDBOX_DEFAULT_THEME: "${SANDBOX_DEFAULT_THEME:-deckyard}"
      SANDBOX_WATERMARK: "${SANDBOX_WATERMARK:-Sandbox export • Created by an anonymous user}"
      # Ensure sandbox writes into the mounted volumes (not /app/server/data-sandbox).
      SANDBOX_DATA_DIR: "/app/server/data"
      SANDBOX_UPLOADS_DIR: "/app/server/uploads"

      # Guardrails
      SECURE_COOKIES: "1"
      DISABLE_UPLOADS: "1"

      # Rate-limiter proxy trust. Caddy terminates TLS and forwards
      # X-Forwarded-For, so without this the limiter keys every request on the
      # Caddy container IP — all guests share one create/export/update bucket and
      # a single abuser trips 429 for everyone. One trusted hop (Caddy) → key on
      # the real client IP. See server/utils/rate-limit.js.
      TRUST_PROXY: "1"
      TRUSTED_PROXY_COUNT: "1"

      # Lower body cap for an anonymous playground: bounds per-request (and thus
      # per-deck) bytes well below the 25 MB default, so imports/saves can't be
      # used to fill the shared volume. 8 MB still covers a modest demo deck.
      MAX_REQUEST_BODY_BYTES: "${MAX_REQUEST_BODY_BYTES:-8388608}"

      # Per-guest disk quota (anonymous abuse guard). A guest that hits the cap
      # gets a 4xx instead of filling sandbox_data. See
      # server/storage/presentations/sandbox-quota.js.
      SANDBOX_MAX_DECKS_PER_GUEST: "${SANDBOX_MAX_DECKS_PER_GUEST:-25}"
      SANDBOX_MAX_BYTES_PER_GUEST: "${SANDBOX_MAX_BYTES_PER_GUEST:-52428800}"
      # Global soft ceiling: the cleanup loop logs a warning when the whole
      # presentations dir exceeds this (observability, non-destructive). Empty
      # disables the check.
      SANDBOX_MAX_TOTAL_BYTES: "${SANDBOX_MAX_TOTAL_BYTES:-}"

      # AI is off in sandbox (SANDBOX_MODE forces disableAi): a public,
      # anonymous playground plus per-prompt LLM cost is an open-ended bill.
      # These are kept for reference but have no effect while sandbox is on.
      MISTRAL_API: "${MISTRAL_API:-}"
      MISTRAL_MODEL: "${MISTRAL_MODEL:-mistral-small-latest}"

      # Optional: keep Notion off by default in sandbox
      NOTION_FEATURE: "${NOTION_FEATURE:-0}"
      NOTION_SECRET: "${NOTION_SECRET:-}"
    volumes:
      - sandbox_data:/app/server/data
      - sandbox_uploads:/app/server/uploads
    expose:
      - "4177"

  caddy:
    image: caddy:2-alpine
    container_name: deckyard-sandbox-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:-sandbox.deckyard.eu}"
      LETSENCRYPT_EMAIL: "${LETSENCRYPT_EMAIL:-}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  sandbox_data:
  sandbox_uploads:
  caddy_data:
  caddy_config:


