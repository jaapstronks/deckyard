  <meta name="theme-color" content="#0b1220" />

  <!-- UI mode bootstrap (app UI only): avoid flash of wrong theme.
       Stored preference: localStorage['ps-ui-mode'] = 'system' | 'light' | 'dark' -->
  <script>
    (function () {
      try {
        var pref = (localStorage.getItem('ps-ui-mode') || 'system').toLowerCase();
        if (pref !== 'light' && pref !== 'dark' && pref !== 'system') pref = 'system';
        var resolved = pref;
        if (pref === 'system') {
          var m = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
          resolved = m && m.matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.uiMode = resolved === 'dark' ? 'dark' : 'light';
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0b1220' : '#f6f7fb');
      } catch (e) {
        // ignore
      }
    })();
  </script>
