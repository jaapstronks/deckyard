name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For security issues, use
        private reporting via the Security tab instead (see SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag (vX.Y.Z) or commit SHA you're running.
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Browser, OS, deployment (Docker or bare Node), reverse proxy if any.
    validations:
      required: false
